  <body class="bg-slate-950 text-slate-300 font-sans selection:bg-red-600 selection:text-white overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      // ==========================================
      // 1. DATOS GLOBALES (LATÍN)
      // ==========================================
      
      // Datos para el análisis interactivo (Basado en el fragmento principal de 1.1 y 1.2)
      const textData = [
        { id: 1, text: "Romanum", lemma: "Romanus, -a, -um", morph: "Nom. Sing. Neutro", sintax: "CN / Adyacente (de imperium)", category: "Adjetivo" },
        { id: 2, text: "imperium", lemma: "imperium, -ii", morph: "Nom. Sing. Neutro (2ª Decl)", sintax: "Núcleo del Sujeto", category: "Sustantivo" },
        { id: 3, text: ",", isPunct: true },
        { id: 4, text: "a", lemma: "a / ab", morph: "Preposición de Ablativo", sintax: "Enlace (Complemento Circunstancial)", category: "Preposición" },
        { id: 5, text: "Romulo", lemma: "Romulus, -i", morph: "Abl. Sing. Masc. (2ª Decl)", sintax: "Término (C. Circunstancial de Origen)", category: "Nombre Propio" },
        { id: 6, text: "exordium", lemma: "exordium, -ii", morph: "Acusativo Sing. Neutro (2ª Decl)", sintax: "Complemento Directo", category: "Sustantivo" },
        { id: 7, text: "habet", lemma: "habeo", morph: "3ª Sing. Pres. Indicativo Activo", sintax: "Núcleo del Predicado", category: "Verbo" },
        { id: 8, text: ".", isPunct: true },
        { id: 9, text: "Is", lemma: "is, ea, id", morph: "Nom. Sing. Masc.", sintax: "Núcleo del Sujeto", category: "Pronombre Demostrativo" },
        { id: 10, text: "cum", lemma: "cum", morph: "Conjunción subordinante (Cum histórico)", sintax: "Nexo", category: "Conjunción" },
        { id: 11, text: "inter", lemma: "inter", morph: "Preposición de Acusativo", sintax: "Enlace (C. Circunstancial)", category: "Preposición" },
        { id: 12, text: "pastores", lemma: "pastor, pastoris", morph: "Acusativo Plural Masc. (3ª Decl)", sintax: "Término (C. Circunstancial)", category: "Sustantivo" },
        { id: 13, text: "latrocinaretur", lemma: "latrocinor", morph: "3ª Sing. Pretérito Imperfecto Subjuntivo (Deponente)", sintax: "Núcleo Predicado (Sub. Adverbial)", category: "Verbo" },
        { id: 14, text: ",", isPunct: true },
        { id: 15, text: "urbem", lemma: "urbs, urbis", morph: "Acusativo Sing. Fem. (3ª Decl)", sintax: "Núcleo del C. Directo", category: "Sustantivo" },
        { id: 16, text: "exiguam", lemma: "exiguus, -a, -um", morph: "Acusativo Sing. Fem.", sintax: "Adyacente (de urbem)", category: "Adjetivo" },
        { id: 17, text: "constituit", lemma: "constituo", morph: "3ª Sing. Pretérito Perfecto Indicativo Act.", sintax: "Núcleo del Predicado Principal", category: "Verbo" },
        { id: 18, text: ".", isPunct: true }
      ];

      const quizData = [
        { q: "1. En la frase 'Condita civitate...', ¿qué estructura sintáctica encontramos?", options: ["Un complemento predicativo", "Un ablativo absoluto", "Una oración subordinada final", "Un complemento agente"], answer: 1,
          explanation: "Se trata de un Ablativo Absoluto compuesto por 'condita' (participio de perfecto pasivo en ablativo) y 'civitate' (sustantivo en ablativo). Se traduce como 'Una vez fundada la ciudad'.", curiosity: "El ablativo absoluto es una construcción típica del latín, totalmente desligada sintácticamente de la oración principal (de ahí lo de 'absoluto', del latín absolvere: desatar/soltar)." },
        { q: "2. La conjunción 'cum' seguida de un verbo en pretérito imperfecto o pluscuamperfecto de subjuntivo se conoce como...", options: ["Cum causal", "Cum concesivo", "Cum histórico / narrativo", "Cum temporal de indicativo"], answer: 2,
          explanation: "Es el famoso 'Cum histórico', muy frecuente en narraciones pasadas (como en Eutropio o César). Se traduce normalmente por 'al + infinitivo' o por un gerundio.", curiosity: "En el fragmento 'cum inter pastores latrocinaretur', se traduce perfectamente como 'practicando el latrocinio entre pastores'." },
        { q: "3. En latín, ¿cómo se expresa típicamente la edad (ej. 'a los dieciocho años')?", options: ["Preposición 'in' + ablativo", "Participio 'natus' + acusativo de tiempo", "Genitivo de cualidad", "Dativo posesivo"], answer: 1,
          explanation: "La edad se expresa con el participio 'natus-a-um' (nacido) concordando con el sujeto, y un numeral junto a la palabra 'annos' (años) en caso Acusativo de extensión en el tiempo.", curiosity: "En el texto vemos: 'decem et octo annos natus' (literalmente: nacido 18 años)." },
        { q: "4. ¿Qué particularidad tiene el verbo 'latrocinor' (latrocinaretur)?", options: ["Es un verbo defectivo", "Es un verbo deponente", "Es un verbo impersonal", "Pertenece a la 5ª conjugación"], answer: 1,
          explanation: "Es un verbo deponente. Tiene forma pasiva (terminación -tur) pero su significado y traducción son activos ('practicaba el latrocinio').", curiosity: "Los verbos deponentes 'depusieron' (dejaron caer) su significado pasivo original a lo largo de la evolución del idioma." },
        { q: "5. En 'quorum consilio omnia ageret', ¿por qué el verbo está en subjuntivo?", options: ["Porque es una oración principal de deseo", "Porque es un subjuntivo deliberativo", "Porque es una subordinada adjetiva de relativo con matiz final", "Porque depende de un verbo de temor"], answer: 2,
          explanation: "Las oraciones de relativo llevan indicativo normalmente. Si llevan subjuntivo, adquieren un matiz adverbial (final o consecutivo). Aquí significa 'para que con su consejo hiciera todo'.", curiosity: "El latín usa el relativo + subjuntivo como una forma muy elegante de evitar repetir la conjunción 'ut' en la prosa culta." }
      ];

      // ==========================================
      // 2. COMPONENTES AUXILIARES
      // ==========================================
      const syntaxColors = {
        Sujeto: "border-blue-500 bg-blue-950/30 text-blue-200",
        Predicado: "border-red-500 bg-red-950/30 text-red-200",
        AblativoAbsoluto: "border-amber-500 bg-amber-950/30 text-amber-200",
        Subordinada: "border-emerald-500 bg-emerald-950/30 text-emerald-200",
      };

      const SyntaxBox = ({ type, title, children }) => (
        <div className={`p-4 rounded-xl border-l-4 mb-4 ${syntaxColors[type] || "border-slate-500 bg-slate-900/50"}`}>
          <h4 className="text-sm font-black uppercase tracking-widest mb-3 opacity-80">{title}</h4>
          <div className="space-y-2 text-[15px] font-light">
            {children}
          </div>
        </div>
      );

      // ==========================================
      // 3. SECCIÓN 1: FRAGMENTOS 1.1 y 1.2
      // ==========================================
      function Fragmentos() {
        const [activeFrag, setActiveFrag] = useState('1.1');

        return (
          <div className="space-y-8 animate-fade-in pb-10">
            <header className="border-b border-slate-800 pb-6">
              <h2 className="text-4xl font-black text-white mb-2">1. Análisis de Textos de Eutropio</h2>
              <p className="text-slate-400 text-lg font-light">Traducción lineal y disección en cajas morfosintácticas.</p>
            </header>

            <div className="flex flex-wrap gap-2 bg-slate-900 p-2 rounded-xl border border-slate-800">
              <button onClick={() => setActiveFrag('1.1')} className={`px-5 py-2.5 rounded-lg font-bold tracking-wide transition-colors text-sm ${activeFrag === '1.1' ? 'bg-red-700 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>Fragmento 1.1</button>
              <button onClick={() => setActiveFrag('1.2')} className={`px-5 py-2.5 rounded-lg font-bold tracking-wide transition-colors text-sm ${activeFrag === '1.2' ? 'bg-red-700 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>Fragmento 1.2</button>
              <button onClick={() => setActiveFrag('1.3')} className={`px-5 py-2.5 rounded-lg font-bold tracking-wide transition-colors text-sm ${activeFrag === '1.3' ? 'bg-red-700 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>Fragmento 1.3</button>
            </div>

            {/* CONTENIDO 1.1 */}
            {activeFrag === '1.1' && (
              <div className="space-y-8 animate-fade-in">
                <div className="bg-slate-900/80 p-8 rounded-3xl border border-slate-800 shadow-xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-64 h-64 bg-red-600/10 rounded-full blur-[80px]"></div>
                  <h3 className="text-2xl font-bold text-red-500 mb-4 font-serif">Texto Latino</h3>
                  <p className="text-xl text-slate-300 font-serif leading-relaxed italic border-l-4 border-red-500/50 pl-6 bg-slate-950/50 py-4 pr-4 rounded-r-xl">
                    "Romanum imperium, quo neque ab exordio ullum fere minus neque incrementis toto orbe amplius humana potest memoria recordari, a Romulo exordium habet, qui Reae Silviae, Vestalis virginis, filius et, quantum putatus est, Martis cum Remo fratre uno partu editus est. Is cum inter pastores latrocinaretur, decem et octo annos natus urbem exiguam in Palatino monte constituit."
                  </p>
                  
                  <h3 className="text-2xl font-bold text-amber-500 mt-8 mb-4 font-serif">Traducción</h3>
                  <p className="text-lg text-slate-200 font-light leading-relaxed bg-amber-950/20 p-6 rounded-2xl border border-amber-900/30">
                    El Imperio Romano, ni menor que el cual en su comienzo ni más vasto en su desarrollo en todo el orbe casi puede ser recordado alguno por la memoria humana, tiene su origen en Rómulo, quien, hijo de Rea Silvia, virgen Vestal y, cuanto se considera, de Marte, fue alumbrado en un solo parto con su hermano Remo. Éste, practicando el latrocinio entre pastores, a los dieciocho años levantó una ciudad pequeña en el monte Palatino.
                  </p>
                </div>

                <div className="grid lg:grid-cols-2 gap-6">
                  <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl">
                    <h3 className="text-xl font-bold text-white mb-6 border-b border-slate-700 pb-3">Primera Oración (Análisis)</h3>
                    <SyntaxBox type="Predicado" title="Proposición Principal">
                      <p><strong>Texto:</strong> Romanum imperium, a Romulo exordium habet.</p>
                      <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-300">
                        <li><strong>Sujeto:</strong> <em>Romanum imperium</em> (N.S. Neutro).</li>
                        <li><strong>CC Origen:</strong> <em>A Romulo</em> (Prep + Abl.S).</li>
                        <li><strong>CD:</strong> <em>exordium</em> (Ac.S. Neutro).</li>
                        <li><strong>Núcleo:</strong> <em>habet</em> (3ªSg Pres. Ind. Activo).</li>
                      </ul>
                    </SyntaxBox>
                    <SyntaxBox type="Subordinada" title="Sub. Adjetiva Relativa 1">
                      <p><strong>Texto:</strong> quo neque ab exordio ullum fere minus... humana potest memoria recordari</p>
                      <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-300">
                        <li><strong>Sujeto:</strong> <em>Quo neque ullum fere minus... amplius</em> (El relativo 'quo' actúa como 2º término de comparación).</li>
                        <li><strong>C. Agente:</strong> <em>humana memoria</em> (Abl.S. Fem).</li>
                        <li><strong>Núcleo:</strong> <em>potest</em> + Infinitivo Pasivo <em>recordari</em>.</li>
                      </ul>
                    </SyntaxBox>
                  </div>
                  
                  <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl flex flex-col justify-between">
                    <div>
                      <h3 className="text-xl font-bold text-white mb-6 border-b border-slate-700 pb-3">Segunda Oración (Análisis)</h3>
                      <SyntaxBox type="Sujeto" title="Proposición Principal">
                        <p><strong>Texto:</strong> Is, decem et octo annos natus urbem exiguam in Palatino monte constituit.</p>
                        <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-300">
                          <li><strong>Sujeto:</strong> <em>Is</em> ... <em>natus</em> (Nom.Sg Masc + participio concertado).</li>
                          <li><strong>Expresión de edad:</strong> <em>decem et octo annos</em> (Ac.Pl extension temporal).</li>
                          <li><strong>CD:</strong> <em>urbem exiguam</em> (Ac.Sg Fem).</li>
                          <li><strong>CCL (Ubi):</strong> <em>in Palatino monte</em> (Prep + Abl.Sg).</li>
                          <li><strong>Núcleo:</strong> <em>constituit</em> (3ªSg Pret.Perf.Ind.Activo).</li>
                        </ul>
                      </SyntaxBox>
                    </div>
                    <SyntaxBox type="Subordinada" title="Sub. Adverbial (Cum Histórico)">
                      <p><strong>Texto:</strong> cum inter pastores latrocinaretur</p>
                      <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-300">
                        <li><strong>Nexo:</strong> <em>Cum</em> histórico.</li>
                        <li><strong>CC:</strong> <em>inter pastores</em> (Prep + Ac.Pl).</li>
                        <li><strong>Núcleo:</strong> <em>latrocinaretur</em> (3ªSg Pret.Imp.Subjuntivo, deponente).</li>
                      </ul>
                    </SyntaxBox>
                  </div>
                </div>
              </div>
            )}

            {/* CONTENIDO 1.2 */}
            {activeFrag === '1.2' && (
              <div className="space-y-8 animate-fade-in">
                <div className="bg-slate-900/80 p-8 rounded-3xl border border-slate-800 shadow-xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-64 h-64 bg-blue-600/10 rounded-full blur-[80px]"></div>
                  <h3 className="text-2xl font-bold text-blue-500 mb-4 font-serif">Texto Latino</h3>
                  <p className="text-xl text-slate-300 font-serif leading-relaxed italic border-l-4 border-blue-500/50 pl-6 bg-slate-950/50 py-4 pr-4 rounded-r-xl">
                    "Condita civitate, quam ex nomine suo Romam vocavit, haec fere egit. Multitudinem finitimorum in civitatem recepit, centum ex senioribus legit, quorum consilio omnia ageret, quos senatores nominavit propter senectutem. Tum, cum uxores ipse et populus suus non haberent, invitavit ad spectaculum ludorum vicinas urbi Romae nationes atque earum virgines rapuit."
                  </p>
                  
                  <h3 className="text-2xl font-bold text-amber-500 mt-8 mb-4 font-serif">Traducción</h3>
                  <p className="text-lg text-slate-200 font-light leading-relaxed bg-amber-950/20 p-6 rounded-2xl border border-amber-900/30">
                    Una vez fundada la ciudad, que de su nombre llamó Roma, llevó a cabo en general esto: Recibió a multitud de habitantes de los alrededores en la ciudad, eligió a 100 de los mayores, con cuyo consejo haría todo, a los que llamó senadores a causa de su ancianidad. Entonces, no teniendo esposas ni él mismo ni su pueblo, invitó al espectáculo de los juegos a las ciudades vecinas a la ciudad de Roma y raptó a sus vírgenes.
                  </p>
                </div>

                <div className="grid lg:grid-cols-2 gap-6">
                  <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl">
                    <SyntaxBox type="AblativoAbsoluto" title="Ablativo Absoluto">
                      <p><strong>Texto:</strong> Condita civitate</p>
                      <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-300">
                        <li><strong>Sujeto:</strong> <em>civitate</em> (Abl.S. Fem, 3ª Decl).</li>
                        <li><strong>Predicado/Participio:</strong> <em>condita</em> (Abl.S. Fem, part. perf. pasivo).</li>
                      </ul>
                    </SyntaxBox>
                    <SyntaxBox type="Subordinada" title="Sub. Relativo (Valor Final)">
                      <p><strong>Texto:</strong> quorum consilio omnia ageret</p>
                      <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-300">
                        <li><strong>Sujeto:</strong> Elíptico (Rómulo).</li>
                        <li><strong>CC (Instrumento):</strong> <em>quorum consilio</em> (Gen.Pl Relativo + Abl.Sg).</li>
                        <li><strong>CD:</strong> <em>omnia</em> (Ac.Pl Neutro).</li>
                        <li><strong>Núcleo:</strong> <em>ageret</em> (Subjuntivo que confiere valor final).</li>
                      </ul>
                    </SyntaxBox>
                  </div>
                  <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl">
                    <SyntaxBox type="Predicado" title="Oraciones Principales Yuxtapuestas">
                      <p><em>Multitudinem... recepit</em> y <em>centum... legit</em></p>
                      <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-300">
                        <li><strong>CD 1:</strong> <em>Multitudinem finitimorum</em> (Ac.Sg + Gen.Pl CN).</li>
                        <li><strong>CCL:</strong> <em>in civitatem</em> (Prep + Ac.Sg).</li>
                        <li><strong>CD 2:</strong> <em>centum</em> (Numeral indeclinable).</li>
                        <li><strong>CC (Partitivo):</strong> <em>ex senioribus</em> (Prep + Abl.Pl).</li>
                      </ul>
                    </SyntaxBox>
                    <SyntaxBox type="Subordinada" title="Cum Histórico 2">
                      <p><strong>Texto:</strong> cum uxores ipse et populus suus non haberent</p>
                      <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-300">
                        <li><strong>Sujeto compuesto:</strong> <em>ipse et populus suus</em>.</li>
                        <li><strong>CD:</strong> <em>uxores</em> (Ac.Pl Fem).</li>
                        <li><strong>Núcleo:</strong> <em>haberent</em> (3ªPl Pret.Imp. Subj).</li>
                      </ul>
                    </SyntaxBox>
                  </div>
                </div>
              </div>
            )}

            {/* CONTENIDO 1.3 */}
            {activeFrag === '1.3' && (
              <div className="space-y-8 animate-fade-in">
                <div className="bg-slate-900/80 p-8 rounded-3xl border border-slate-800 shadow-xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-600/10 rounded-full blur-[80px]"></div>
                  <h3 className="text-2xl font-bold text-emerald-500 mb-4 font-serif">Texto Latino</h3>
                  <p className="text-xl text-slate-300 font-serif leading-relaxed italic border-l-4 border-emerald-500/50 pl-6 bg-slate-950/50 py-4 pr-4 rounded-r-xl">
                    "Postea Numa Pompilius rex creatus est, qui bellum quidem nullum gessit, sed non minus civitati quam Romulus profuit. Nam et leges Romanis moresque constituit, qui consuetudine proeliorum iam latrones ac semibarbari putabantur, et annum descripsit in decem menses prius sine aliqua supputatione confusum, et infinita Romae sacra ac templa constituit. Morbo decessit quadragesimo et tertio imperii anno."
                  </p>
                  
                  <h3 className="text-2xl font-bold text-amber-500 mt-8 mb-4 font-serif">Traducción</h3>
                  <p className="text-lg text-slate-200 font-light leading-relaxed bg-amber-950/20 p-6 rounded-2xl border border-amber-900/30">
                    Después fue nombrado rey Numa Pompilio, que ciertamente no llevó a cabo ninguna guerra, pero no fue de menos provecho para la ciudad que Rómulo. Pues no sólo instituyó leyes y costumbres para los Romanos, que por el hábito de los combates eran considerados ladrones y semibárbaros, sino que también dividió el año, antes confuso sin cómputo alguno, en diez meses, y además estableció en Roma infinidad de ceremonias religiosas y templos. Murió de enfermedad en el cuadragésimo tercer año de mandato.
                  </p>
                </div>
                
                <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl">
                   <h3 className="text-xl font-bold text-white mb-6 border-b border-slate-700 pb-3">Sintaxis Destacada (Numa Pompilio)</h3>
                   <div className="grid md:grid-cols-3 gap-4">
                     <SyntaxBox type="Sujeto" title="Voz Pasiva y C. Predicativo">
                       <p><em>Numa Pompilius rex creatus est</em></p>
                       <p className="mt-2 text-sm text-slate-400">Sujeto paciente (Numa) + Atributo/Predicativo (rex) + Verbo Pasivo (creatus est).</p>
                     </SyntaxBox>
                     <SyntaxBox type="Predicado" title="Dativo de Interés">
                       <p><em>civitati [...] profuit</em></p>
                       <p className="mt-2 text-sm text-slate-400"><strong>civitati</strong> es Dativo Singular (3ª Decl). El verbo <em>prosum</em> (ser de provecho) rige dativo.</p>
                     </SyntaxBox>
                     <SyntaxBox type="AblativoAbsoluto" title="Locativo y Tiempo">
                       <p><em>Romae [...] anno</em></p>
                       <p className="mt-2 text-sm text-slate-400"><strong>Romae</strong> es un vestigio del caso Locativo (indica lugar en donde para ciudades). <strong>Anno</strong> es Ablativo de Tiempo (CCT).</p>
                     </SyntaxBox>
                   </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ==========================================
      // 4. SECCIÓN 2: ANÁLISIS TEXTUAL INTERACTIVO
      // ==========================================
      function AnalisisTextual() {
        const [selectedWord, setSelectedWord] = useState(null);

        const handleWordClick = (wordData) => {
          if (wordData.isPunct) return;
          setSelectedWord(wordData);
        };

        return (
          <div className="space-y-10 animate-fade-in pb-10">
            <header className="border-b border-slate-800 pb-6">
              <h2 className="text-4xl font-black text-white mb-2">2. Papiro Interactivo</h2>
              <p className="text-slate-400 text-lg font-light">Selecciona cada término para desentrañar su morfología y sintaxis según las cajas del PDF.</p>
            </header>

            <div className="grid xl:grid-cols-12 gap-12">
              <div className="xl:col-span-7 bg-slate-900/80 p-12 rounded-[2.5rem] border border-slate-800 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.6)] leading-[4.5rem] text-[2.2rem] font-serif text-justify relative overflow-hidden backdrop-blur-xl">
                <div className="absolute top-0 right-0 p-6 opacity-5 pointer-events-none">
                  <span className="text-9xl">🏛️</span>
                </div>
                {textData.map((item, idx) => (
                  <React.Fragment key={idx}>
                    {item.isPunct ? (
                      <span className="text-slate-600 mr-4 font-sans font-light">{item.text}</span>

                      <span
                        onClick={() => handleWordClick(item)}
                        className={`cursor-pointer transition-all duration-300 ease-in-out pb-2 border-b-4
                          ${selectedWord?.id === item.id
                            ? "text-red-400 border-red-600 bg-red-600/15 drop-shadow-[0_0_15px_rgba(220,38,38,0.5)] scale-105 rounded-t-xl px-2 z-10 relative latin-text font-bold"
                            : "text-slate-200 border-transparent hover:text-red-400 hover:border-red-500 hover:bg-red-500/10 rounded-t-xl px-2 latin-text"

                ))}
              </div>

              <div className="xl:col-span-5">
                <div className="sticky top-10 bg-slate-900 rounded-[2.5rem] border border-slate-800 p-10 shadow-2xl min-h-[550px] flex flex-col relative overflow-hidden transition-all duration-500">
                  {selectedWord ? (
                    <div className="animate-fade-in h-full flex flex-col">
                      <div className="absolute top-0 right-0 bg-red-600/10 text-red-500 text-sm px-5 py-2.5 rounded-bl-3xl font-mono font-bold border-b border-l border-red-600/20 shadow-sm uppercase tracking-widest">
                        {selectedWord.category}
                      </div>

                      <h3 className="text-5xl font-serif text-amber-500 mb-8 drop-shadow-xl leading-tight mt-6">{selectedWord.text}</h3>

                      <div className="bg-slate-950/60 rounded-2xl p-6 border border-slate-800 mb-8 flex-shrink-0 shadow-inner">
                        <p className="text-sm text-slate-500 uppercase tracking-widest font-black mb-2 flex items-center">📖 Enunciado (Diccionario)</p>
                        <p className="text-2xl text-emerald-400 font-serif">{selectedWord.lemma}</p>
                      </div>

                      <div className="space-y-6 flex-1">
                        <div className="relative pl-8 border-l-4 border-blue-500/60 bg-slate-950/30 p-6 rounded-r-2xl">
                          <div className="absolute w-4 h-4 bg-blue-500 rounded-full -left-[10px] top-7 shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
                          <p className="text-sm text-blue-400 uppercase tracking-widest font-black mb-2">Análisis Morfológico</p>
                          <p className="text-slate-200 text-xl leading-relaxed font-light">{selectedWord.morph}</p>
                        </div>

                        <div className="relative pl-8 border-l-4 border-purple-500/60 bg-slate-950/30 p-6 rounded-r-2xl">
                          <div className="absolute w-4 h-4 bg-purple-500 rounded-full -left-[10px] top-7 shadow-[0_0_15px_rgba(168,85,247,0.8)]"></div>
                          <p className="text-sm text-purple-400 uppercase tracking-widest font-black mb-2">Función Sintáctica (Caja)</p>
                          <div className="inline-block bg-purple-900/40 text-purple-200 border border-purple-500/50 px-5 py-2.5 rounded-xl font-medium text-lg shadow-md">
                            {selectedWord.sintax}
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center justify-center h-full text-slate-500 text-center space-y-8 opacity-40 my-auto p-6">
                      <div className="w-32 h-32 bg-slate-950 rounded-full flex items-center justify-center shadow-[inset_0_5px_20px_rgba(0,0,0,0.5)] border border-slate-800">
                        <span className="text-6xl">👆</span>
                      </div>
                      <p className="text-xl font-medium px-4 leading-relaxed">Haz clic sobre cualquier término en el texto latino para revelar su análisis en este panel.</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 5. SECCIÓN 3: TEST DE GRAMÁTICA APLICADA
      // ==========================================
      function Quiz() {
        const [score, setScore] = useState(0);
        const [answered, setAnswered] = useState(Array(quizData.length).fill(null));

        const handleAnswer = (qIndex, oIndex) => {
          if (answered[qIndex] !== null) return;
          const newAnswered = [...answered];
          newAnswered[qIndex] = oIndex;
          setAnswered(newAnswered);

          if (oIndex === quizData[qIndex].answer) {
            setScore(s => s + 1);
          }
        };

        const getOptionClass = (qIndex, oIndex) => {
          const ans = answered[qIndex];
          const isCorrect = quizData[qIndex].answer === oIndex;

          if (ans === null) return "bg-slate-900 hover:bg-slate-800 text-slate-300 border-slate-700 hover:border-red-500/50 shadow-md";
          if (isCorrect) return "bg-emerald-900/90 text-emerald-100 border-emerald-500 shadow-[0_0_25px_rgba(16,185,129,0.4)] scale-[1.03] z-10 font-bold";
          if (ans === oIndex && !isCorrect) return "bg-red-900/90 text-red-100 border-red-500 shadow-[0_0_25px_rgba(239,68,68,0.4)]";
          return "bg-slate-950 text-slate-600 border-slate-900 opacity-40";
        };

        return (
          <div className="space-y-16 animate-fade-in pb-10">
            <header className="border-b border-slate-800 pb-8 flex flex-col md:flex-row justify-between md:items-end gap-6">
              <div>
                <h2 className="text-5xl font-bold text-white mb-4">3. Cuestionario de Sintaxis Latina</h2>
                <p className="text-slate-400 text-xl font-light">Comprueba lo aprendido sobre las estructuras gramaticales de este texto.</p>
              </div>
              <div className="bg-slate-900 px-10 py-5 rounded-3xl border border-slate-800 flex items-center space-x-5 shadow-2xl backdrop-blur-md">
                <span className="text-slate-500 text-base uppercase tracking-widest font-black">Aciertos</span>
                <span className="text-5xl font-black text-amber-500 drop-shadow-xl">{score}<span className="text-3xl text-slate-600 font-normal">/5</span></span>
              </div>
            </header>

            <div className="grid xl:grid-cols-2 gap-12">
              {quizData.map((q, qIndex) => (
                <div key={qIndex} className="bg-slate-900 p-10 rounded-[2.5rem] border border-slate-800 shadow-2xl flex flex-col justify-between overflow-hidden relative transition-all duration-300 hover:border-slate-600">
                  <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none text-9xl font-serif font-black text-red-500">
                    {qIndex + 1}
                  </div>
                  <div className="relative z-10">
                    <h3 className="text-2xl font-medium text-white mb-8 leading-[1.6]">{q.q}</h3>
                    <div className="grid grid-cols-1 gap-4">
                      {q.options.map((opt, oIndex) => (
                        <button
                          key={oIndex}
                          onClick={() => handleAnswer(qIndex, oIndex)}
                          disabled={answered[qIndex] !== null}
                          className={`p-5 rounded-2xl text-left transition-all duration-300 border-2 flex items-center group ${getOptionClass(qIndex, oIndex)}`}
                        >
                          <span className={`font-black mr-5 w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl transition-colors text-lg ${answered[qIndex] === null ? 'bg-slate-800 text-slate-400 group-hover:bg-red-600 group-hover:text-white' : 'bg-black/30 text-white/90'}`}>
                            {['A', 'B', 'C', 'D'][oIndex]}
                          </span>
                          <span className="text-lg">{opt}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className={`mt-8 overflow-hidden transition-all duration-[800ms] ease-in-out ${answered[qIndex] !== null ? 'max-h-[800px] opacity-100' : 'max-h-0 opacity-0'}`}>
                    <div className="bg-slate-950 p-6 rounded-2xl border-l-4 border-blue-500 shadow-[inset_0_2px_15px_rgba(0,0,0,0.5)] mt-4 mb-4 relative">
                      <p className="text-blue-400 font-black uppercase tracking-widest text-xs mb-2">Explicación Sintáctica</p>
                      <p className="text-slate-300 text-[15px] leading-relaxed font-light">{q.explanation}</p>
                    </div>
                    <div className="bg-slate-950 p-6 rounded-2xl border-l-4 border-amber-500 shadow-[inset_0_2px_15px_rgba(0,0,0,0.5)] relative">
                      <p className="text-amber-500 font-black uppercase tracking-widest text-xs mb-2">En el texto</p>
                      <p className="text-slate-300 text-[15px] leading-relaxed font-light italic">{q.curiosity}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // ==========================================
      // COMPONENTE PRINCIPAL APP
      // ==========================================
      function App() {
        const [activeTab, setActiveTab] = useState(1);

        const menuItems = [
          { id: 1, title: "Análisis de Eutropio", icon: "🏛️" },

        return (

                <p className="text-base text-slate-400 font-medium tracking-wide">Resolución Tarea 3.2</p>
              </div>
              
              <ul className="space-y-2 p-6 flex-1 overflow-y-auto">
                {menuItems.map((tab) => (
                  <li key={tab.id}>
                    <button
                      onClick={() => setActiveTab(tab.id)}
                      className={`w-full flex items-center px-5 py-5 rounded-2xl transition-all duration-300 font-bold text-lg group ${
                        activeTab === tab.id
                          ? "bg-slate-800 text-red-400 shadow-lg border border-red-900/50 scale-[1.02]"

                    >
                      <span className={`text-2xl mr-4 transition-transform duration-300 ${activeTab === tab.id ? 'scale-125 drop-shadow-md' : 'group-hover:scale-125'}`}>{tab.icon}</span>
                      <span className="tracking-wide">{tab.title}</span>
                      {activeTab === tab.id && (
                        <div className="ml-auto w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_10px_#ef4444]"></div>
                      )}
                    </button>
                  </li>
                ))}
              </ul>
              <div className="p-6 border-t border-slate-800 text-sm text-slate-500 font-medium text-center bg-slate-950/30 uppercase tracking-widest leading-relaxed">
                I.E.S. San José de la Rinconada<br/>
                <span className="text-xs opacity-70">Dpto. Cultura Clásica</span>
              </div>
            </nav>

            {/* CONTENIDO PRINCIPAL */}
            <main className="flex-1 overflow-y-auto h-screen relative bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950 scroll-smooth">
              <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'url("data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")' }}></div>

              <div className="max-w-7xl mx-auto relative z-10 p-8 md:p-14 pb-24">
                {activeTab === 1 && <Fragmentos />}
                {activeTab === 2 && <AnalisisTextual />}
                {activeTab === 3 && <Quiz />}
              </div>
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
